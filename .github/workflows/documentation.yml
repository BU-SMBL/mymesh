name: Deploy Sphinx Documentation
on:
  push:
    branches:
      - main
  pull_request:
  release:
    types: [published]
jobs:
  build:
    runs-on: ubuntu-22.04
    defaults:
      run:
        shell: bash --login -e {0}
    steps:
    - name: Check out code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        fetch-tags: true
    - name: Set up miniconda
      uses: conda-incubator/setup-miniconda@v3
      with:
        python-version: '3.10'
        auto-update-conda: true
        activate-environment: sphinx-env
        environment-file: null
        auto-activate-base: false
    - name: Update Conda Environment
      shell: bash -l {0}
      run: |
        conda install -c conda-forge libstdcxx-ng
        conda install -c conda-forge gcc
    - name: Prepare System Environment
      shell: bash -l {0}
      run: |
        sudo apt-get update -qq

        # Mesa OpenGL for VisPy software rendering
        sudo apt-get install -y \
          libgl1-mesa-dri \
          libgl1-mesa-glx \
          libglu1-mesa-dev \
          libosmesa6-dev \
          mesa-utils \
          xvfb

        # XCB/X11 runtime libs that PyQt6's bundled Qt needs to link against
        sudo apt-get install -y \
          libxkbcommon0 \
          libxkbcommon-x11-0 \
          libxcb1 \
          libxcb-randr0 \
          libxcb-render-util0 \
          libxcb-xinerama0 \
          libxcb-icccm4 \
          libxcb-image0 \
          libxcb-keysyms1 \
          libxcb-cursor0

        # Start Xvfb virtual display
        /sbin/start-stop-daemon --start --quiet \
          --pidfile /tmp/custom_xvfb_99.pid --make-pidfile \
          --background --exec /usr/bin/Xvfb \
          -- :99 -screen 0 1400x900x24 -ac +extension GLX +render
        sleep 5

        # XDG runtime dir (required by Qt)
        mkdir -p /tmp/runtime-runner
        chmod 700 /tmp/runtime-runner

        # Persist env vars for subsequent steps
        {
          echo "DISPLAY=:99.0"
          echo "LIBGL_ALWAYS_SOFTWARE=1"
          echo "MESA_GL_VERSION_OVERRIDE=3.3"
          echo "LD_LIBRARY_PATH=/usr/lib/x86_64-linux-gnu:$LD_LIBRARY_PATH"
          echo "XDG_RUNTIME_DIR=/tmp/runtime-runner"
          echo "QT_QPA_PLATFORM=offscreen"
        } >> $GITHUB_ENV
    - name: Install Python dependencies
      shell: bash -l {0}
      run: |
        export DISPLAY=:99.0
        python -m pip install --upgrade pip
        # Uninstall any existing PyQt6 installation
        pip uninstall -y PyQt6 PyQt6-Qt6 PyQt6-sip
        # Install specific version of PyQt6 that matches Ubuntu's Qt version
        # Ubuntu 22.04 typically uses Qt 6.2.x
        pip install "PyQt6==6.2.3" "PyQt6-Qt6==6.2.3" "PyQt6-sip>=13.2.0"
        # Then install other dependencies
        pip install \
          sphinx \
          pydata-sphinx-theme \
          matplotlib \
          sphinx-gallery \
          sphinxcontrib-bibtex \
          sphinx-copybutton \
          jupyter-sphinx \
          setuptools \
          sphinx-design \
          sphinx-tabs \
          myst-parser \
          pillow \
          jupyter_rfb \
          triangle \
          pyvista \
          trimesh[easy]\
          py-cpuinfo
        # Install vispy last
        pip install vispy
    - name: Install package
      shell: bash -l {0}
      run: pip install -e .[all,test]
    - name: Verify System Setup
      shell: bash -l {0}
      run: |
        glxinfo | grep "OpenGL"
        echo "Qt version:"
        qtchooser -print-env || true
        qmake6 -v || true
    - name: Verify VisPy setup
      shell: bash -l {0}
      run: |
        export DISPLAY=:99.0
        python -c "import vispy; vispy.use(app='osmesa'); print(vispy.sys_info())"
    - name: Debug rendering environment
      shell: bash -l {0}
      run: |
        pip show vispy
        glxinfo | grep -E "OpenGL|renderer|version"
        # ls -la /usr/lib/dri/swrast_dri.so
        python -c "
        import vispy
        vispy.use(app='osmesa')
        from vispy import app, scene
        
        canvas = scene.SceneCanvas(size=(400,400), show=False, bgcolor='red')        
        canvas.update()
        app.process_events()
        app.process_events()
        img = canvas.render()
        print('render shape:', img.shape)
        print('alpha channel sample:', img[::50,::50,3])   # should be 255 if working
        print('min/max RGBA:', img.min(), img.max())        # max should be 255 if working
        "
    - name: Install Graphviz
      shell: bash -l {0}
      run: |
        sudo apt-get update
        sudo apt-get install -y graphviz
    - name: Generate changelog
      shell: bash -l {0}
      run: |
        pip install commitizen
        cz changelog
    - name: Determine Version
      id: set_version
      shell: bash -l {0}
      env:
        # Pass the version to conf.py so pydata-sphinx-theme highlights the right dropdown item
        SPHINX_DOC_VERSION: ${{ env.DOC_VERSION }}
      run: |
        # If triggered by a release, use the release tag. Otherwise, use 'dev'.
        if [ "${{ github.event_name }}" == "release" ]; then
          echo "DOC_VERSION=${{ github.event.release.tag_name }}" >> $GITHUB_ENV
        else
          echo "DOC_VERSION=dev" >> $GITHUB_ENV
        fi
    - name: Build documentation
      shell: bash -l {0}
      run: |
        export DISPLAY=:99.0
        sphinx-build -b html ./docs/source ./docs/build
    - name: Run tests
      shell: bash -l {0}
      run: |
        pip install pytest
        pytest
    - name: Prepare Versioned Folders
      # Only run staging/deployment on main branch pushes or releases (not PRs)
      if: github.event_name == 'release' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
      shell: bash -l {0}
      run: |
        # create a staging area
        mkdir -p staging/${{ env.DOC_VERSION }}
        
        # copy the html to versioned subfolder
        cp -r ./docs/build/* staging/${{ env.DOC_VERSION }}/
        
        # copy switcher.json to the root of the site
        if [ -f "./docs/source/_static/switcher.json" ]; then
          cp ./docs/source/_static/switcher.json staging/switcher.json
        fi
        
        # create root redirect if this is a published release (making it the latest stable)
        if [ "${{ github.event_name }}" == "release" ]; then
          cat <<EOF > staging/index.html
        <!DOCTYPE html>
        <html>
          <head><meta http-equiv="refresh" content="0; url=./${{ env.DOC_VERSION }}/index.html"></head>
          <body><p>Redirecting to <a href="./${{ env.DOC_VERSION }}/">latest documentation</a>...</p></body>
        </html>
        EOF
        fi
    - name: Deploy to GitHub Pages
      if: github.event_name == 'release' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./staging
        keep_files: true